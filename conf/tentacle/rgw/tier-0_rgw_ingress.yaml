globals:
  - ceph-cluster:
      name: ceph

      node1:
        disk-size: 15
        no-of-volumes: 3
        role:
          - _admin
          - installer
          - mgr
          - mon
          - osd

      node2:
        disk-size: 15
        no-of-volumes: 3
        role:
          - mgr
          - mon
          - osd

      node3:
        disk-size: 15
        no-of-volumes: 3
        role:
          - mon
          - mgr
          - osd
          - rgw

      node4:
        disk-size: 15
        no-of-volumes: 3
        role:
          - osd
          - rgw

      node5:
        role:
          - ingress

      node6:
        role:
          - client

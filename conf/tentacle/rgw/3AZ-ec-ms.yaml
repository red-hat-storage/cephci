# Test Suite that deploys 3 AZs in different subnets
# Deployment for all the ceph daemons , with 9 mon's, 6 mgr's, 28 OSD daemons

globals:
  - ceph-cluster:
      name: ceph-pri
      node1:
        networks:
          - provider_net_cci_11
        role:
          - _admin
          - mon
          - mgr
          - installer
          - alertmanager
          - grafana
          - prometheus
          - osd
        no-of-volumes: 3
        disk-size: 10
      node2:
        networks:
          - provider_net_cci_11
        role:
          - mon
          - mgr
          - rgw
          - osd
        no-of-volumes: 3
        disk-size: 10

---
# OCP Virtualization inventory for RHEL 10 (latest).
# Use with: --cloud ocpvirt --inventory conf/inventory/ocpvirt-rhel-10-latest.yaml
#
# image-name is imported as a CDI DataVolume source:
#   - registry path → docker://<image> (container disk)
#   - http(s)://... → HTTP disk import
# Replace image-name with a RHEL 10 container-disk available in your cluster's registry
# if the default below is not pullable from the OCP cluster.

version_id: "10"
id: rhel
instance:
  create:
    image-name: images.paas.redhat.com/it-uis/it-base-rhel10_amd64
    cpu: "4"
    memory: 8Gi
    root_disk_size: 40Gi
    # Optional alternate sizing form (overrides cpu/memory when set): "cores-memory"
    # vm-size: "4-8Gi"

  setup: |
    #cloud-config

    ssh_pwauth: true
    disable_root: false

    groups:
      - cephuser

    users:
      - name: cephuser
        primary-group: cephuser
        sudo: ALL=(ALL) NOPASSWD:ALL
        shell: /bin/bash
        ssh-authorized-keys:
          - ssh-rsa  psathyan@psathyan.remote.csb
          - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAILuKaVnvq986B7zkgR0LyQbUo5F6JfrU9NnrRp1XbAYG ceph qe svc
          - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPoKGCTzMmNvHFY4THKNpZYFLeEgB7Do8y2JAEy+ZvIZ ceph-qe-sa

    chpasswd:
      list: |
        root:passwd
        cephuser:pass123
      expire: false

    runcmd:
      - sed -i -e 's/^Defaults\s\+requiretty/# \0/' /etc/sudoers
      - echo "net.core.default_qdisc=netem" > /etc/sysctl.d/1000-qdisc.conf
      - timedatectl set-timezone Etc/UTC
      - hostnamectl set-hostname $(hostname -s)
      - sed -i -e 's/#PermitRootLogin .*/PermitRootLogin yes/' /etc/ssh/sshd_config
      - systemctl restart sshd
      - curl -m 120 -o /etc/pki/ca-trust/source/anchors/ceph-qe-ca.pem http://magna002.ceph.redhat.com/cephci-jenkins/.cephqe-ca.pem
      - curl -m 120 -k -o /etc/pki/ca-trust/source/anchors/RH-IT-Root-CA.crt https://certs.corp.redhat.com/certs/Current-IT-Root-CAs.pem
      - update-ca-trust
      - touch /ceph-qa-ready

    final_message: "Ready for ceph qa testing"

---
# RedHat Enterprise Linux 10.1 - MEDIUM profile (4 vCPUs / 16GB / 100GB + 3x50GB)
# Same image as onecloud-rhel-10.1-server-x86_64.yaml, different profile
version_id: 10.1
id: rhel
instance:
  create:
    image_id: 22
    projectID: 21
    site: POK
    groupID: 1
    VLAN: 2231
    resources: medium
    arch: x86_64
    os: RHEL

  setup: |
    #cloud-config
    ssh_pwauth: true
    disable_root: false

    groups:
      - cephuser

    users:
      - name: cephuser
        primary-group: cephuser
        sudo: ALL=(ALL) NOPASSWD:ALL
        shell: /bin/bash
        ssh-authorized-keys:
          - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAILuKaVnvq986B7zkgR0LyQbUo5F6JfrU9NnrRp1XbAYG ceph qe svc
          - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPoKGCTzMmNvHFY4THKNpZYFLeEgB7Do8y2JAEy+ZvIZ ceph-qe-sa

    chpasswd:
      list: |
        root:passwd
        cephuser:pass123
      expire: false

    runcmd:
      - sed -i -e 's/^Defaults\s\+requiretty/# \0/' /etc/sudoers
      - echo "net.core.default_qdisc=netem" > /etc/sysctl.d/1000-qdisc.conf
      - timedatectl set-timezone Etc/UTC
      - hostnamectl set-hostname $(hostname -s)
      - sed -i -e 's/#PermitRootLogin .*/PermitRootLogin yes/' /etc/ssh/sshd_config
      - systemctl restart sshd
      - touch /ceph-qa-ready

    final_message: "Ready for ceph qa testing"

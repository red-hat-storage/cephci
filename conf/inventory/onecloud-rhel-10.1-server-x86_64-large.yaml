---
# RedHat Enterprise Linux 10.1 - LARGE profile (8 vCPUs / 32GB / 100GB + 6x30GB)
# image_id: Get from OneCloud API (GET /vm/images)
# OneCloud ignores userData; bootstrap is done via subprocess SSH in ceph.py
version_id: 10.1
id: rhel
instance:
  create:
    image_id: 451  # RHEL 10.1 from OneCloud (get from API/portal)
    projectID: 808  # IBM-Ceph-QE (get from API/portal)
    site: TUC
    groupID: 1
    VLAN: 2231
    resources: large  # Profiles: small | medium | large
    arch: x86_64
    os: RHEL

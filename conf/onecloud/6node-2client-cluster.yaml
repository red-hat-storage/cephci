# OneCloud cluster config - 8 VMs max
# Use with:
#   run.py --global-conf conf/onecloud/1admin-8node-cluster.yaml \
#     --inventory conf/inventory/onecloud-rhel-10.1-server-x86_64.yaml \
#     --cloud onecloud --suite <suite> --platform rhel-10.1-server-x86_64
#
# Credentials: ~/osp-cred-ci-2.yaml (globals.onecloud-credentials). See osp-cred-onecloud-example.yaml.
# OneCloud does not support custom disks; no-of-volumes/disk-size are ignored (forced to 0).
# For cephadm: use all-available-devices to deploy OSDs on discovered devices.

globals:
  - ceph-cluster:
      name: ceph
      node1:
        role:
          - _admin
          - installer
          - mon
          - mgr
          - node-exporter
          - alertmanager
          - grafana
          - prometheus
          - crash
        no-of-volumes: 0
        disk-size: 0
      node2:
        role:
          - mon
          - mgr
          - mds
          - nfs
          - rgw
          - node-exporter
          - alertmanager
          - crash
        no-of-volumes: 0
        disk-size: 0
      node3:
        role:
          - mon
          - mgr
          - mds
          - rgw
          - node-exporter
          - crash
        no-of-volumes: 0
        disk-size: 0
      node4:
        role:
          - mon
          - mds
          - rgw
          - node-exporter
          - crash
        no-of-volumes: 0
        disk-size: 0
      node5:
        role:
          - mds
          - rgw
          - node-exporter
          - crash
        no-of-volumes: 0
        disk-size: 0
      node6:
        role:
          - mds
          - nfs
          - rgw
          - node-exporter
          - crash
        no-of-volumes: 0
        disk-size: 0
      node7:
        role:
          - client
      node8:
        role:
          - client

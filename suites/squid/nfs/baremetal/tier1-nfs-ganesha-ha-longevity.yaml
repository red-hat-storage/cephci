##############################################################################################
# Tier-Level: 1
# Test-Suite: tier1-nfs-ganesha-ha-longevity.yaml
# Scenario: Run longevity test for NFS-Ganesha with HA
#
# Cluster Configuration: Conf: baremetal_custom config
# Add more clients if required
# Test Steps:
# - Deploy
# - Deploy RHCS 7.1 client
# - Deploy NFS-Ganesha with HA
# - Upgrade cluster
################################################################################################
tests:
  - test:
      abort-on-fail: true
      desc: Install software pre-requisites for cluster deployment.
      module: install_prereq.py
      name: setup pre-requisites

  - test:
      abort-on-fail: true
      config:
        steps:
          - config:
              command: bootstrap
              service: cephadm
              args:
                mon-ip: node1
          - config:
              command: add_hosts
              service: host
              args:
                attach_ip_address: true
                labels: apply-all-labels
          - config:
              command: apply
              service: osd
              args:
                all-available-devices: true
          - config:
              command: apply
              service: rgw
              pos_args:
                - rgw.1
              args:
                placement:
                  label: rgw
          - config:
              args:
                - "ceph fs volume create cephfs"
              command: shell
          - config:
              args:
                placement:
                  label: mds
              base_cmd_args:
                verbose: true
              command: apply
              pos_args:
                - cephfs
              service: mds
          - config:
              args:
                - "ceph osd pool create rbd"
              command: shell
          - config:
              args:
                - "rbd pool init rbd"
              command: shell
      desc: bootstrap and deploy services.
      destroy-cluster: false
      polarion-id: CEPH-83573713
      module: test_cephadm.py
      name: Deploy cluster using cephadm

  - test:
      abort-on-fail: true
      config:
        command: add
        id: client.1
        node: node5
        install_packages:
          - ceph-common
          - ceph-fuse
        copy_admin_keyring: true
      desc: Configure the RGW,RBD client system
      destroy-cluster: false
      module: test_client.py
      name: configure client

  - test:
        name: setting up ganesha for basic io
        module: test_nfs_multiple_operations_for_upgrade.py
        desc: nfs multiple operations - create, delete, write, read, rename
        polarion-id: CEPH-83620035
        abort-on-fail: false
        config:
          cluster_name: cephfs-nfs-longevity
          nfs_version: 4.2
          clients: 1
          setup: false
          file_count: 50
          dd_command_size_in_M: 10
          active_standby: True
          operation: before_upgrade
          ha : True
          vip : 10.8.130.231/21

  - test:
        name:  Performing nfs io operations cluster parallel tests
        module: test_parallel.py
        desc: longevity test for nfs in parallel
        parallel:
          - test:
              name: nfs operations for longevity - basic io
              module: test_nfs_io_operations_during_upgrade.py
              desc: nfs multiple operations - create, delete, write, read, rename
              polarion-id: CEPH-83620035
              abort-on-fail: false
              config:
                nfs_cluster_name: cephfs-nfs-longevity
                nfs_version: 4.2
                clients: 1
                setup: false
                file_count: 25
                dd_command_size_in_M: 10
                exports_number: 4
                loop_count: 4
                ha: True
                vip: 10.8.130.231/21
                active_standby: True

          - test:
              name: cthon tests for NFS ganesha
              module: test_cthon.py
              desc: cthon tests for NFS ganesha - running all testcases basic, general, special and lock
              polarion-id: CEPH-83617827
              abort-on-fail: false
              config:
                nfs_version: 4.2
                clients: 1
                total_num_exports: 4
                nfs_mount : /mnt/cthon
                nfs_export : /cthon
                longevity : true
                longevity_loop : 4
                nfs_name : cephfs-nfs-cthon

          - test:
              name: deploy multiple nfs ganesha servers concurrently
              desc: Deploy multiple nfs ganesha servers concurrently and verify
              polarion-id: CEPH-83621553
              module: test_deploy_multiple_nfs_ganesha_concurrently.py
              config:
                nfs_version: 4.2
                clients: 1
                timeout: 100
                nfs_instance_number: 6
                longevity_loop : 2
                spec:
                  service_type: nfs
                  service_id: nfs
                  placement:
                    host_pattern: '*'
                  spec:
                    port: 50001
                    monitoring_port: 60000

  - test:
        name: cleaning up nfs io operations cluster
        module: test_nfs_multiple_operations_for_upgrade.py
        desc: nfs multiple operations - create, delete, write, read, rename
        polarion-id: CEPH-83620035
        abort-on-fail: false
        config:
          cluster_name: cephfs-nfs-longevity
          nfs_version: 4.2
          clients: 1
          setup: false
          file_count: 50
          dd_command_size_in_M: 10
          operation: after_upgrade

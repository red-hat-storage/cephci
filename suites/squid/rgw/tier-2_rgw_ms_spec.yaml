# global conf : /conf/squid/rgw_multisite.yaml 
# Rgw multisite deployed with rgw module method
tests:
  - test:
      abort-on-fail: true
      desc: Install software pre-requisites for cluster deployment.
      module: install_prereq.py
      name: setup pre-requisites

  - test:
      abort-on-fail: true
      clusters:
        ceph-pri:
          config:
            verify_cluster_health: true
            steps:
              - config:
                  command: bootstrap
                  service: cephadm
                  args:
                    registry-url: registry.redhat.io
                    mon-ip: node1
                    orphan-initial-daemons: true
                    initial-dashboard-password: admin@123
                    dashboard-password-noupdate: true
                    skip-monitoring-stack: true
              - config:
                  command: add_hosts
                  service: host
                  args:
                    attach_ip_address: true
                    labels: apply-all-labels
              - config:
                  command: apply
                  service: mgr
                  args:
                    placement:
                      label: mgr
              - config:
                  command: apply
                  service: mon
                  args:
                    placement:
                      label: mon
              - config:
                  command: apply
                  service: osd
                  args:
                    all-available-devices: true
              - config:
                  args:
                    - "ceph mgr module enable rgw"
                  command: shell
        ceph-sec:
          config:
            verify_cluster_health: true
            steps:
              - config:
                  command: bootstrap
                  service: cephadm
                  args:
                    registry-url: registry.redhat.io
                    mon-ip: node1
                    orphan-initial-daemons: true
                    initial-dashboard-password: admin@123
                    dashboard-password-noupdate: true
                    skip-monitoring-stack: true
              - config:
                  command: add_hosts
                  service: host
                  args:
                    attach_ip_address: true
                    labels: apply-all-labels
              - config:
                  command: apply
                  service: mgr
                  args:
                    placement:
                      label: mgr
              - config:
                  command: apply
                  service: mon
                  args:
                    placement:
                      label: mon
              - config:
                  command: apply
                  service: osd
                  args:
                    all-available-devices: true
      desc: RHCS cluster deployment using cephadm.
      polarion-id: CEPH-83575222
      destroy-cluster: false
      module: test_cephadm.py
      name: deploy cluster

  - test:
      clusters:
        ceph-pri:
          config:
            verify_cluster_health: true
            steps:
              - config:
                  command: apply_spec
                  service: orch
                  validate-spec-services: true
                  specs:
                    - service_type: prometheus
                      placement:
                        count: 1
                        nodes:
                          - node1
                    - service_type: grafana
                      placement:
                        nodes:
                          - node1
                    - service_type: alertmanager
                      placement:
                        count: 1
                    - service_type: node-exporter
                      placement:
                        host_pattern: "*"
                    - service_type: crash
                      placement:
                        host_pattern: "*"
        ceph-sec:
          config:
            verify_cluster_health: true
            steps:
              - config:
                  command: apply_spec
                  service: orch
                  validate-spec-services: true
                  specs:
                    - service_type: prometheus
                      placement:
                        count: 1
                        nodes:
                          - node1
                    - service_type: grafana
                      placement:
                        nodes:
                          - node1
                    - service_type: alertmanager
                      placement:
                        count: 1
                    - service_type: node-exporter
                      placement:
                        host_pattern: "*"
                    - service_type: crash
                      placement:
                        host_pattern: "*"
      name: Monitoring Services deployment
      desc: Add monitoring services using spec file.
      module: test_cephadm.py
      polarion-id: CEPH-83574727

  - test:
      abort-on-fail: true
      clusters:
        ceph-pri:
          config:
            command: add
            id: client.1
            node: node6
            install_packages:
              - ceph-common
            copy_admin_keyring: true
        ceph-sec:
          config:
            command: add
            id: client.1
            node: node6
            install_packages:
              - ceph-common
            copy_admin_keyring: true
      desc: Configure the RGW client system
      polarion-id: CEPH-83573758
      destroy-cluster: false
      module: test_client.py
      name: configure client
  - test:
      abort-on-fail: true
      clusters:
        ceph-pri:
          config:
            haproxy_clients:
              - node6
            rgw_endpoints:
              - node5:80
        ceph-sec:
          config:
            haproxy_clients:
              - node6
            rgw_endpoints:
              - node5:80
      desc: "Configure HAproxy"
      module: haproxy.py
  #     name: "Configure HAproxy"
  - test:
      abort-on-fail: true
      clusters:
        ceph-pri:
          config:
            steps:
              - config:
                  args:
                    - "ceph mgr module enable rgw"
                  command: shell 
              - config:
                  command: apply_spec
                  service: orch
                  specs:
                    - service_type: rgw
                      service_id: shared.pri
                      service_name: rgw.shared.pri
                      rgw_realm: india
                      rgw_zonegroup: shared
                      rgw_zone: primary
                      placement:
                        nodes:
                          - node5
                      spec:
                        rgw_frontend_port: 80
              - config:
                  args:
                    - "sleep 30"
                    - "ceph orch restart rgw.shared.pri"
                  command: shell
        ceph-sec:
          config:
            steps:
              - config:
                  args:
                    - "sleep 90"
                    - |
                      PRIMARY_RGW_ENDPOINT="http://{node_ip:ceph-pri#node5}:80"
                      REALM_NAME="india"
                      echo "Attempting to fetch realm token for '$REALM_NAME' from primary RGW at $PRIMARY_RGW_ENDPOINT"
                      export RGW_REALM_TOKEN_FETCHED=$(cephadm shell -- radosgw-admin realm tokens --url "${PRIMARY_RGW_ENDPOINT}" | jq -r ".[] | select(.realm == \"${REALM_NAME}\").token")
                      if [ -z "$RGW_REALM_TOKEN_FETCHED" ]; then
                        echo "Error: Failed to fetch RGW realm token for '$REALM_NAME' from primary RGW at $PRIMARY_RGW_ENDPOINT."
                        exit 1
                      fi
                      echo "Successfully fetched RGW_REALM_TOKEN_FETCHED."
              - config:
                  command: apply_spec
                  service: orch
                  specs:
                    - rgw_zone: secondary
                      rgw_realm_token: "{{ ceph_sec.RGW_REALM_TOKEN_FETCHED }}"
                      placement:
                        nodes:
                          - node5
                      spec:
                        rgw_frontend_port: 80
      desc: Setting up RGW multisite replication environment
      module: test_cephadm.py
      name: setup multisite
      polarion-id: CEPH-10362
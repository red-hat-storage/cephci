  #    desc: MDS traceability - jaeger tracing config, sliding window, trace dump for IO
  #    abort-on-fail: false
  ######################################################################################################################
  # Feature: MDS Observability
  # mds_rank_perf metrics, CPU vs counters validation
  ######################################################################################################################
  - test:
      name: test MDS metrics observability
      module: cephfs_mds_observability.test_mds_metrics.py
      polarion-id: CEPH-83632240
      desc: MDS observability - subvolume metrics, mds_rank_perf counters, CPU validation
      abort-on-fail: false
  ######################################################################################################################
  # Feature: CephFS Subvolume Metrics - Functional
  ######################################################################################################################

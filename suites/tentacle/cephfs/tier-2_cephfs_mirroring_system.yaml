#===============================================================================================
# Tier-level: 2
# Test-Suite: tier-2_cephfs_mirroring_system.yaml
# Test-Case: CephFS Mirror system tests - daemon and MDS failure operations
# Conf file : conf/tentacle/cephfs/tier-2_cephfs_mirror_ha.yaml
# Cluster Configuration:
#    No of Clusters : 2
#    Cluster 1 :
#    3 MONS, 2 MGR, 5 MDS, 3 OSD, 2 CEPHFS MIRROR, 1 Client service daemon(s)
#     Node1 - Mon, Mgr, Installer, MDS
#     Node2 - Mon, Mgr, MDS
#     Node3 - Mon, OSD, MDS
#     Node4 - OSD, MDS
#     Node5 - OSD, MDS
#     Node6 - CephFS Mirror, MDS
#     Node7 - CephFS Mirror, MDS
#     Node8 - Client
#    Cluster 2 :
#    3 MONS, 2 MGR, 2 MDS, 3 OSD and 1 Client service daemon(s)
#     Node1 - Mon, Mgr, Installer
#     Node2 - Mon, Mgr, MDS
#     Node3 - Mon, OSD, MDS
#     Node4 - OSD, MDS
#     Node5 - OSD, MDS
#     Node6 - Client

#===============================================================================================
tests:
  - test:
      name: setup install pre-requisistes
      desc: Setup phase to deploy the required pre-requisites for running the tests.
      module: install_prereq.py
      abort-on-fail: true
  - test:
      abort-on-fail: true
      clusters:
        ceph1:
          config:
            verify_cluster_health: true
            steps:
              - config:
                  command: bootstrap
                  service: cephadm
                  args:
                    registry-url: registry.redhat.io
                    mon-ip: node1
                    orphan-initial-daemons: true
                    skip-monitoring-stack: true
              - config:
                  command: add_hosts
                  service: host
                  args:
                    attach_ip_address: true
                    labels: apply-all-labels
              - config:
                  command: apply
                  service: mgr
                  args:
                    placement:
                      label: mgr
              - config:
                  command: apply
                  service: mon
                  args:
                    placement:
                      label: mon
              - config:
                  command: apply
                  service: osd
                  args:
                    all-available-devices: true
              - config:
                  command: shell
                  args: # arguments to ceph orch
                    - "ceph fs volume create cephfs"
              - config:
                  command: apply
                  service: mds
                  base_cmd_args: # arguments to ceph orch
                    verbose: true
                  pos_args:
                    - cephfs                        # name of the filesystem
                  args:
                    placement:
                      nodes:
                        - node3
                        - node4
                        - node5
              - config:
                  command: apply
                  service: cephfs-mirror
                  args:
                    placement:
                      label: cephfs-mirror
                      limit: 1
        ceph2:
          config:
            verify_cluster_health: true
            steps:
              - config:
                  command: bootstrap
                  service: cephadm
                  args:
                    registry-url: registry.redhat.io
                    mon-ip: node1
                    orphan-initial-daemons: true
                    skip-monitoring-stack: true
              - config:
                  command: add_hosts
                  service: host
                  args:
                    attach_ip_address: true
                    labels: apply-all-labels
              - config:
                  command: apply
                  service: mgr
                  args:
                    placement:
                      label: mgr
              - config:
                  command: apply
                  service: mon
                  args:
                    placement:
                      label: mon
              - config:
                  command: apply
                  service: osd
                  args:
                    all-available-devices: true
              - config:
                  command: shell
                  args:                             # arguments to ceph orch
                    - "ceph fs volume create cephfs"
              - config:
                  command: apply
                  service: mds
                  base_cmd_args:                    # arguments to ceph orch
                    verbose: true
                  pos_args:
                    - cephfs                        # name of the filesystem
                  args:
                    placement:
                      nodes:
                        - node3
                        - node4
                        - node5
      desc:  CephFS Mirror cluster deployment using cephadm
      destroy-cluster: false
      module: test_cephadm.py
      polarion-id: CEPH-83574114
      name: deploy cephfs-mirror
  - test:
        abort-on-fail: true
        clusters:
          ceph1:
            config:
              command: add
              copy_admin_keyring: true
              id: client.1
              install_packages:
                - ceph-common
                - ceph-fuse
              node: node8
          ceph2:
            config:
              command: add
              copy_admin_keyring: true
              id: client.1
              install_packages:
                - ceph-common
                - ceph-fuse
              node: node6
        desc: "Configure the Cephfs client system 1"
        destroy-cluster: false
        module: test_client.py
        name: "configure client"

  - test:
      abort-on-fail: false
      desc: "Perform mds failure operations during active mirroring"
      clusters:
        ceph1:
          config:
            name: Perform mds operations during active mirroring
      module: cephfs_mirroring_system.test_cephfs_mirroring_system_mds.py
      name: Perform mds failure operations during active mirroring
      polarion-id: "CEPH-83632241"

  - test:
      abort-on-fail: false
      desc: "Perform mirror-daemon failure operations during active mirroring"
      clusters:
        ceph1:
          config:
            name: Perform mirror-daemon operations during active mirroring
      module: cephfs_mirroring_system.test_cephfs_mirroring_system_mirror_daemon.py
      name: Perform mirror-daemon failure operations during active mirroring
      polarion-id: "CEPH-83632241"

#===============================================================================================
# Tier-level: 2
# Test-Suite: tier-2_cephfs_mirror_snapshot_sync_perf.yaml
# Test-Case: CephFS Mirror Snapshot Sync Performance - Small Files
#
# Measures how cephfs_mirror_max_datasync_threads affects snapshot sync
# throughput for a workload of small files (2KB-256KB) across kernel,
# fuse, and NFS mount types.
# Each thread count is tested on fresh subvolumes for a clean initial sync.
#
# NOTE: Large file and mixed dataset tests run in separate suites to avoid
# cascading failures from shared NFS/mirroring state between sequential tests.
#
# Cluster Configuration:
#    No of Clusters : 2
#    Cluster 1 :
#    3 MONS, 2 MGR, 2+ MDS, 3 OSD, 1 NFS, 1 CEPHFS MIRROR, 1 Client
#     Node1 - Mon, Mgr, Installer, MDS
#     Node2 - Mon, Mgr, MDS
#     Node3 - Mon, OSD, MDS
#     Node4 - OSD, MDS, NFS
#     Node5 - OSD, MDS, NFS
#     Node6 - CephFS Mirror, MDS
#     Node7 - Client
#    Cluster 2 :
#    3 MONS, 2 MGR, 2+ MDS, 3 OSD, 1 Client
#     Node1 - Mon, Mgr, Installer
#     Node2 - Mon, Mgr, MDS
#     Node3 - Mon, OSD, MDS
#     Node4 - OSD, MDS, NFS
#     Node5 - OSD, MDS, NFS
#     Node6 - Client
#
# Conf file: conf/tentacle/cephfs/tier-1_cephfs_mirror.yaml
#
#===============================================================================================
tests:
  - test:
      name: setup install pre-requisistes
      desc: Setup phase to deploy the required pre-requisites for running the tests.
      module: install_prereq.py
      abort-on-fail: true
  - test:
      abort-on-fail: true
      clusters:
        ceph1:
          config:
            verify_cluster_health: true
            steps:
              - config:
                  command: bootstrap
                  service: cephadm
                  args:
                    registry-url: registry.redhat.io
                    mon-ip: node1
                    orphan-initial-daemons: true
                    skip-monitoring-stack: true
              - config:
                  command: add_hosts
                  service: host
                  args:
                    attach_ip_address: true
                    labels: apply-all-labels
              - config:
                  command: apply
                  service: mgr
                  args:
                    placement:
                      label: mgr
              - config:
                  command: apply
                  service: mon
                  args:
                    placement:
                      label: mon
              - config:
                  command: apply
                  service: osd
                  args:
                    all-available-devices: true
              - config:
                  command: shell
                  args:
                    - "ceph fs volume create cephfs"
              - config:
                  command: apply
                  service: mds
                  base_cmd_args:
                    verbose: true
                  pos_args:
                    - cephfs
                  args:
                    placement:
                      nodes:
                        - node4
                        - node5
              - config:
                  command: apply
                  service: cephfs-mirror
                  args:
                    placement:
                      nodes:
                        - node6
        ceph2:
          config:
            verify_cluster_health: true
            steps:
              - config:
                  command: bootstrap
                  service: cephadm
                  args:
                    registry-url: registry.redhat.io
                    mon-ip: node1
                    orphan-initial-daemons: true
                    skip-monitoring-stack: true
              - config:
                  command: add_hosts
                  service: host
                  args:
                    attach_ip_address: true
                    labels: apply-all-labels
              - config:
                  command: apply
                  service: mgr
                  args:
                    placement:
                      label: mgr
              - config:
                  command: apply
                  service: mon
                  args:
                    placement:
                      label: mon
              - config:
                  command: apply
                  service: osd
                  args:
                    all-available-devices: true
              - config:
                  command: shell
                  args:
                    - "ceph fs volume create cephfs"
              - config:
                  command: apply
                  service: mds
                  base_cmd_args:
                    verbose: true
                  pos_args:
                    - cephfs
                  args:
                    placement:
                      nodes:
                        - node4
                        - node5
      desc: CephFS Mirror cluster deployment using cephadm
      destroy-cluster: false
      module: test_cephadm.py
      name: deploy cephfs-mirror
  - test:
        abort-on-fail: true
        clusters:
          ceph1:
            config:
              command: add
              copy_admin_keyring: true
              id: client.1
              install_packages:
                - ceph-common
                - ceph-fuse
              node: node7
          ceph2:
            config:
              command: add
              copy_admin_keyring: true
              id: client.1
              install_packages:
                - ceph-common
                - ceph-fuse
              node: node6
        desc: "Configure the Cephfs client system 1"
        destroy-cluster: false
        module: test_client.py
        name: "configure client"
  - test:
      abort-on-fail: false
      desc: "Snapshot Sync Performance Test - Small files with varying datasync thread counts across kernel, fuse, and NFS"
      clusters:
        ceph1:
          config:
            name: Snapshot sync perf test - 100 small files across thread counts 1,3,6,9,12 on kernel/fuse/nfs
            result_file: "small_file_sync_perf.csv"
            thread_counts:
              - 1
              - 3
              - 6
              - 9
              - 12
            num_files: 100
            min_file_size_kb: 2
            max_file_size_kb: 256
      module: cephfs_mirroring.test_cephfs_mirror_snapshot_sync_perf_small_files.py
      name: CephFS Mirror snapshot sync performance - small files
      polarion-id: "CEPH-83574099"
  - test:
      abort-on-fail: false
      desc: "Snapshot Sync Performance Test - Large files (5 x 1GB) with varying datasync thread counts across kernel, fuse, and NFS"
      clusters:
        ceph1:
          config:
            name: Snapshot sync perf test - 5 x 1GB large files across thread counts 1,3,6,9,12 on kernel/fuse/nfs
            result_file: "large_file_sync_perf.csv"
            thread_counts:
              - 1
              - 3
              - 6
              - 9
              - 12
            num_files: 5
            file_size_mb: 1024
      module: cephfs_mirroring.test_cephfs_mirror_snapshot_sync_perf_large_files.py
      name: CephFS Mirror snapshot sync performance - large files
      polarion-id: "CEPH-83574100"
  - test:
      abort-on-fail: false
      desc: "Snapshot Sync Performance Test - Mixed dataset (100 small + 5x1GiB large across dirs) with varying datasync thread counts on kernel/fuse/NFS"
      clusters:
        ceph1:
          config:
            name: Snapshot sync perf test - mixed dataset across thread counts 1,3,6,9,12 on kernel/fuse/nfs
            result_file: "mixed_file_sync_perf.csv"
            thread_counts:
              - 1
              - 3
              - 6
              - 9
              - 12
            num_small_files: 100
            min_small_file_size_kb: 2
            max_small_file_size_kb: 256
            num_small_dirs: 2
            num_large_files: 5
            large_file_size_mb: 1024
            num_large_dirs: 5
      module: cephfs_mirroring.test_cephfs_mirror_snapshot_sync_perf_mixed_files.py
      name: CephFS Mirror snapshot sync performance - mixed files
      polarion-id: "CEPH-83574101"


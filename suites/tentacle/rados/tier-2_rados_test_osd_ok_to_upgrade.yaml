# Suite is to be used to verify osd deployment workflows
# to be run in regression conf: 4-node-ec-cluster-1-client.yaml

tests:
   - test:
       name: setup install pre-requisistes
       desc: Setup phase to deploy the required pre-requisites for running the tests.
       module: install_prereq.py
       abort-on-fail: true

   - test:
       name: cluster deployment
       desc: Execute the cluster deployment workflow.
       module: test_cephadm.py
       abort-on-fail: true
       config:
         verify_cluster_health: true
         steps:
           - config:
               command: bootstrap
               service: cephadm
               base_cmd_args:
                 verbose: true
               args:
                 mon-ip: node1

   - test:
       name: Add host
       desc: Add new host node with IP address
       module: test_host.py
       config:
         command: add_hosts
         service: host
         args:
           nodes:
             - node1
             - node2
             - node3
             - node4
             - node5
           attach_ip_address: true
           labels: apply-all-labels
       destroy-cluster: false
       abort-on-fail: true

   - test:
       name: Mgr and Mon deployment
       desc: Add Mgr and Mon daemons
       module: test_cephadm.py
       polarion-id: CEPH-83573746
       abort-on-fail: true
       config:
         steps:
           - config:
               command: apply
               service: mgr
               args:
                 placement:
                   label: mgr
           - config:
               command: apply
               service: mon
               args:
                 placement:
                   label: mon

   - test:
       name: OSD deployment
       desc: Add OSD services using spec file.
       module: test_cephadm.py
       polarion-id: CEPH-83573746
       abort-on-fail: true
       config:
         steps:
           - config:
               command: apply_spec
               service: orch
               validate-spec-services: true
               specs:
                 - service_type: osd
                   service_id: osds
                   encrypted: "true" # boolean as string
                   placement:
                     label: osd
                   spec:
                     data_devices:
                       all: "true"

   - test:
      name: Configure client admin
      desc: Configures client admin node on cluster
      module: test_client.py
      polarion-id:
      config:
        command: add
        id: client.1                      # client Id (<type>.<Id>)
        node: node6
        install_packages:
          - ceph-common
          - ceph-base
        copy_admin_keyring: true          # Copy admin keyring to node
        caps: # authorize client capabilities
          mon: "allow *"
          osd: "allow *"
          mds: "allow *"
          mgr: "allow *"
      abort-on-fail: true

   - test:
       name: Enable logging to file
       module: rados_prep.py
       config:
         log_to_file: true
       desc: Change config options to enable logging to file

   - test:
      name: Upgrade cluster to latest 9.1 ceph version
      desc: Upgrade cluster to latest 9.1 version
      module: test_upgrade_warn.py
      polarion-id: CEPH-83574934
      config:
        command: start
        service: upgrade
        base_cmd_args:
          verbose: true
        args:
          daemon_types: mgr,crash,mon
          rhcs-version: 9.0 # Just for testing as 9.1 build is not available
          release: stable # Just for testing as 9.1 build is not available
          platform: rhel-9
      abort-on-fail: false

   - test:
      name: OSD upgrade topological scenarios
      desc: Upgrade cluster to latest; for each scenario downgrade OSDs, run orch upgrade, validate
      module: test_osd_ok_to_upgrade_holistic_tests.py
      config:
        scenarios:
          - hosts_HOST1
          - topological_host
          - topological_chassis
          - topological_rack
          - combo_host_chassis_rack
          - combo_chassis_rack
          - combo_chassis1_chassis2_rack1
        upgrade_timeout: 3600
        downgrade_timeout: 600
        crush_hierarchy_cleanup: true

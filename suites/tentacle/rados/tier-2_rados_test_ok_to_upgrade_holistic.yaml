# Suite is to be used to verify holistic upgrade of osd ok-to-upgrade feature
# to be run in regression conf: conf/tentacle/rados/16-node-cluster-1-client.yaml

tests:
  - test:
      name: setup install pre-requisistes
      desc: Setup phase to deploy the required pre-requisites for running the tests.
      module: install_prereq.py
      abort-on-fail: true

  - test:
      name: Cephadm Bootstrap with apply-spec
      desc: Apply spec in Bootstrap with host location attributes
      module: test_bootstrap.py
      polarion-id: CEPH-83575289
      config:
        command: bootstrap
        base_cmd_args:
          verbose: true
        args:
          rhcs-version: 8.1
          platform: rhel-9
          release: rc
          mon-ip: node1
          orphan-initial-daemons: true
          skip-dashboard: true
          ssh-user: cephuser
          # 6 racks × 2 chassis; each chassis has exactly one host (node1–node12)
          # NOTE: node13,14,15 and 16 are not used in test modules.
          apply-spec:
            - service_type: host
              address: true
              labels: apply-all-labels
              nodes:
                - node1
              location:
                root: default
                rack: rack1
                chassis: chassis1
            - service_type: host
              address: true
              labels: apply-all-labels
              nodes:
                - node2
              location:
                root: default
                rack: rack1
                chassis: chassis2
            - service_type: host
              address: true
              labels: apply-all-labels
              nodes:
                - node3
              location:
                root: default
                rack: rack2
                chassis: chassis3
            - service_type: host
              address: true
              labels: apply-all-labels
              nodes:
                - node4
              location:
                root: default
                rack: rack2
                chassis: chassis4
            - service_type: host
              address: true
              labels: apply-all-labels
              nodes:
                - node5
              location:
                root: default
                rack: rack3
                chassis: chassis5
            - service_type: host
              address: true
              labels: apply-all-labels
              nodes:
                - node6
              location:
                root: default
                rack: rack3
                chassis: chassis6
            - service_type: host
              address: true
              labels: apply-all-labels
              nodes:
                - node7
              location:
                root: default
                rack: rack4
                chassis: chassis7
            - service_type: host
              address: true
              labels: apply-all-labels
              nodes:
                - node8
              location:
                root: default
                rack: rack4
                chassis: chassis8
            - service_type: host
              address: true
              labels: apply-all-labels
              nodes:
                - node9
              location:
                root: default
                rack: rack5
                chassis: chassis9
            - service_type: host
              address: true
              labels: apply-all-labels
              nodes:
                - node10
              location:
                root: default
                rack: rack5
                chassis: chassis10
            - service_type: host
              address: true
              labels: apply-all-labels
              nodes:
                - node11
              location:
                root: default
                rack: rack6
                chassis: chassis11
            - service_type: host
              address: true
              labels: apply-all-labels
              nodes:
                - node12
              location:
                root: default
                rack: rack6
                chassis: chassis12
            - service_type: host
              address: true
              labels: apply-all-labels
              nodes:
                - node13
              location:
                root: default
                rack: rack7
                chassis: chassis13
            - service_type: host
              address: true
              labels: apply-all-labels
              nodes:
                - node14
              location:
                root: default
                rack: rack7
                chassis: chassis14
            - service_type: host
              address: true
              labels: apply-all-labels
              nodes:
                - node15
              location:
                root: default
                rack: rack8
                chassis: chassis15
            - service_type: host
              address: true
              labels: apply-all-labels
              nodes:
                - node16
              location:
                root: default
                rack: rack8
                chassis: chassis16
      destroy-cluster: false
      abort-on-fail: true

  - test:
      name: Mgr and Mon deployment
      desc: Add Mgr and Mon daemons
      module: test_cephadm.py
      polarion-id: CEPH-83632280
      abort-on-fail: true
      config:
        steps:
          - config:
              command: apply
              service: mgr
              args:
                placement:
                  label: mgr
          - config:
              command: apply
              service: mon
              args:
                placement:
                  label: mon

  - test:
      name: OSD deployment
      desc: Add OSD services using spec file.
      module: test_cephadm.py
      polarion-id: CEPH-83632280
      abort-on-fail: true
      config:
        steps:
          - config:
              command: apply_spec
              service: orch
              validate-spec-services: true
              specs:
                - service_type: osd
                  service_id: osds
                  encrypted: "true" # boolean as string
                  placement:
                    label: osd
                  spec:
                    data_devices:
                      all: "true"

  - test:
      name: Configure client admin
      desc: Configures client admin node on cluster
      module: test_client.py
      polarion-id:
      config:
        command: add
        id: client.1 # client Id (<type>.<Id>)
        nodes:                            # client node
          - node17:
              release: 8.1
              tag: rc
        install_packages:
          - ceph-common
          - ceph-base
        copy_admin_keyring: true # Copy admin keyring to node
        caps:
          # authorize client capabilities
          mon: "allow *"
          osd: "allow *"
          mds: "allow *"
          mgr: "allow *"
      abort-on-fail: true

  - test:
      name: Enable logging to file
      module: rados_prep.py
      config:
        log_to_file: true
      desc: Change config options to enable logging to file

  - test:
      name: Upgrade mgr,crash,mon to latest 9.1 ceph version
      desc: Upgrade mgr,crash,mon to latest 9.1 ceph version
      module: test_upgrade_warn.py
      polarion-id: CEPH-83574934
      config:
        command: start
        service: upgrade
        base_cmd_args:
          verbose: true
        args:
          daemon_types: mgr,crash,mon
          rhcs-version: 9.1
          release: stable
          platform: rhel-9
      abort-on-fail: true

  - test:
      name: OSD upgrade hosts scenarios
      desc: OSD upgrade hosts scenarios
      module: test_osd_ok_to_upgrade_holistic_tests.py
      polarion-id: CEPH-83632280
      config:
        test_stop_start: true
        scenarios:
          - hosts_HOST1
          - hosts_HOST1_services_osd_osds
          - hosts_rack1_rack2
          # - host_without_osd
          # BUG:- https://ibm-ceph.atlassian.net/browse/IBMCEPH-11215
        limit: 3
        osd_service_name: "osd.osds"
        host_without_osd: node11

  - test:
      name: OSD upgrade topological label scenarios
      desc: OSD upgrade topological label scenarios host chassis rack
      module: test_osd_ok_to_upgrade_holistic_tests.py
      polarion-id: CEPH-83632280
      config:
        test_pause_resume: true
        scenarios:
          - topological_host
          - topological_chassis
          - topological_rack

  - test:
      name: OSD upgrade combination of topological labels scenarios
      desc: Topological labels combination scenarios host chassis and rack
      module: test_osd_ok_to_upgrade_holistic_tests.py
      polarion-id: CEPH-83632280
      config:
        scenarios:
          - combo_host_chassis_rack
          - combo_chassis_rack

  - test:
      name: holistic upgrade negative scenarios - 1
      desc: Negative scenarios for combination of topological labels host chassis rack
      module: test_osd_ok_to_upgrade_holistic_tests.py
      polarion-id: CEPH-83632280
      config:
        test_stop_start: true
        scenarios:
          - combo_chassis1_chassis2_rack1
          - combo_chassis3_rack1_no_match

  - test:
      name: holistic upgrade negative scenarios - 2
      desc: Negative scenarios for invalid host and invalid rack topological labels
      module: test_osd_ok_to_upgrade_holistic_tests.py
      polarion-id: CEPH-83632280
      config:
        scenarios:
          - hosts_invalid_host
          - topological_labels_rack_nonexistent
  - test:
      name: Upgrade all the OSDs in the cluster
      desc: Upgrade all the OSDs in the cluster
      module: test_osd_ok_to_upgrade_holistic_tests.py
      polarion-id: CEPH-83632280
      config:
        scenarios:
          - full_cluster_upgrade

  - test:
      name: Upgrade ceph cluster to 9.x
      desc: Upgrade cluster to latest version and check health warn
      module: test_upgrade_warn.py
      polarion-id: CEPH-83574934
      config:
        verify_warning: true
        verify_daemons: true
        verify_older_version_warn: true
        verify_cluster_usage: true
      abort-on-fail: true

        nfs_mount_prefix: /mnt/nfs_qos
        operation: none
        fault_tolerance: 0.10
        bw_limits:
          - 35MB
          - 50MB
          - 75MB
          - 100MB
        fio_bs: 1M
        fio_iodepth: 32
        fio_numjobs: 4
        fio_runtime: 30
        fio_size: 256M

  - test:
      name: QoS PerShare - 3 NFS clusters
      desc: PerShare bandwidth QoS across all 3 NFS clusters to validate per-cluster aggregate limits
      module: qos.test_nfs_qos_3az_multi_export.py
      polarion-id: CEPH-83611395
      abort-on-fail: false
      config:
        test_scenario: cluster_bandwidth
        qos_type: PerShare
        control: bandwidth_control
        nfs_clusters:
          - nfs-DC1
          - nfs-DC2
          - nfs-DC3
        cephfs_volumes:
          - cephfs-DC1
        num_exports_per_cluster: 3
        subvol_group: ganeshagroup
        nfs_export_prefix: /export_qos
        nfs_mount_prefix: /mnt/nfs_qos
        operation: none
        fault_tolerance: 0.10
        bw_limits:
          - 10MB
          - 15MB
          - 15MB
          - 25MB
          - 50MB
          - 75MB
          - 100MB
        fio_bs: 1M
        fio_iodepth: 32
        fio_numjobs: 4
        fio_runtime: 30
        fio_size: 256M

  - test:
      name: QoS PerShare_PerClient - 3 NFS clusters
      desc: PerShare_PerClient bandwidth QoS across all 3 NFS clusters
      module: qos.test_nfs_qos_3az_multi_export.py
      polarion-id: CEPH-83611393

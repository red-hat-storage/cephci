        rdma_port: "20049"

  - test:
      name: NFS RDMA - Multi-version (v4.2 + v3)
      module: test_nfs_rdma_basic.py
      desc: Two clients with different NFS versions (4.2 and 3) both over RDMA
      abort-on-fail: false
      config:
        scenario: multi_version_rdma
        servers: 1
        clients: 2
        port: "2049"
        rdma_port: "20049"

  - test:
      name: NFS RDMA - Active-Active no VIP
      module: test_nfs_rdma_basic.py
      desc: Two NFS daemons active-active, round-robin RDMA mounts from two clients
      abort-on-fail: false
      config:
        scenario: active_active_no_vip
        servers: 2
        clients: 2
        port: "2049"
        rdma_port: "20049"

  - test:
      name: NFS RDMA - HA with VIP
      module: test_nfs_rdma_basic.py
      desc: HA cluster with ingress/VIP, RDMA mount via floating VIP
      abort-on-fail: false
      config:
        scenario: ha_with_vip
        servers: 2
        clients: 1
        port: "2049"
        rdma_port: "20049"
        vip: "10.64.66.99/24"

  - test:
      name: NFS RDMA - Enable RDMA on existing TCP cluster

  # --- RDMA Basic Workflow Scenarios (one per test entry) ---

  - test:
      name: NFS RDMA - Basic NFSv4.2
      module: test_nfs_rdma_basic.py
      desc: Single daemon RDMA mount with NFSv4.2, integrity verify through unmount/remount
      abort-on-fail: false
      config:
        scenario: basic_rdma_v42
        servers: 1
        clients: 1
        port: "2049"
        rdma_port: "20049"

  - test:
      name: NFS RDMA - NFSv4.1
      module: test_nfs_rdma_basic.py

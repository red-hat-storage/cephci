#===============================================================================================
#
# Tier-level: 2
# Test-Suite: tier2-rack-based-osd-upgrade.yaml
# Test-Case: Perform rack-based OSD upgrade from 8.x to 9.x
#
# Cluster Configuration:
#    conf/tentacle/cephadm/1admin-9node-1client-cluster.yaml
#
# Test Steps:
#   (1) Bootstrap cluster with RHCS Ceph 9.0
#   (2) Deploy services and OSDs
#   (3) Create rack-based CRUSH hierarchy
#   (4) Upgrade non-OSD daemons to 9.x
#   (5) Upgrade OSDs rack by rack (A, then B, then C)
#   (6) Verify cluster health after each rack upgrade
#   (7) Verify final cluster state
#
#===============================================================================================
tests:
  - test:
      name: Install ceph pre-requisites
      desc: installation of ceph pre-requisites
      module: install_prereq.py
      abort-on-fail: true

  - test:
      name: Bootstrap RHCS Ceph 9.0 cluster
      desc: Bootstrap RHCS Ceph 9.0 cluster and deploy services
      polarion-id: CEPH-83573777
      module: test_cephadm.py
      config:
        verify_cluster_health: true
        steps:
          - config:
              command: bootstrap
              service: cephadm
              args:
                rhcs-version: 9.0
                release: "rc"
                mon-ip: node1
                orphan-initial-daemons: true
                skip-monitoring-stack: true
          - config:
              command: add_hosts
              service: host
              args:
                attach_ip_address: true
                labels: apply-all-labels
          - config:
              command: apply
              service: mgr
              args:
                placement:
                  label: mgr
          - config:
              command: apply
              service: mon
              args:
                placement:
                  label: mon
          - config:
              command: apply
              service: osd
              args:
                all-available-devices: true
      destroy-cluster: false
      abort-on-fail: true

  - test:
      name: Configure client
      desc: Configure the RGW,RBD client system
      module: test_client.py
      polarion-id: CEPH-83573777
      config:
        command: add
        id: client.1
        node: node10
        install_packages:
          - ceph-common
          - ceph-fuse
        copy_admin_keyring: true
      destroy-cluster: false
      abort-on-fail: true

  - test:
      name: Deploy rack-based CRUSH hierarchy
      desc: Organize OSDs into rack-based CRUSH hierarchy
      module: test_rack_based_osd_deployment.py
      polarion-id: CEPH-83574800
      config:
        verify_tree: true
      abort-on-fail: true

  - test:
      name: Staggered upgrade with daemon types mgr,mon,crash
      desc: Staggered upgrade with daemon types mgr,mon,crash
      module: test_cephadm_staggered_upgrade.py
      polarion-id: CEPH-83575554
      config:
        action: "daemon_types"
        osd_flags:
          - noout
          - noscrub
          - nodeep-scrub
        flags:
          - automatically-accept-license
        daemon_types: mgr

  - test:
      name: Staggered upgrade with daemon types mon,crash
      desc: Staggered upgrade with daemon types mon,crash
      module: test_cephadm_staggered_upgrade.py
      polarion-id: CEPH-83575554
      config:
        action: "daemon_types"
        flags:
          - automatically-accept-license
        daemon_types: mon,crash

  - test:
      name: Rack-based OSD upgrade to 9.x
      desc: Upgrade OSDs rack by rack to latest 9.x version
      module: test_rack_based_upgrade.py
      #polarion-id: CEPH-83574802
      config:
        command: start
        service: upgrade
        base_cmd_args:
          verbose: true
        verify_cluster_health: true
      destroy-cluster: false
      abort-on-fail: true

  - test:
      name: Verify cluster after upgrade
      desc: Verify cluster health and CRUSH tree after upgrade
      module: test_cephadm.py
      polarion-id: CEPH-83574803
      config:
        verify_cluster_health: true
        steps:
          - config:
              command: shell
              args:
                - ceph
                - status
          - config:
              command: shell
              args:
                - ceph
                - versions
          - config:
              command: shell
              args:
                - ceph
                - osd
                - tree
      destroy-cluster: false
      abort-on-fail: true

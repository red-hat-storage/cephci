tests:
  - test:
      name: setup pre-requisites
      desc: Install software pre-requisites for cluster deployment
      module: install_prereq.py
      abort-on-fail: true

  - test:
      name: Deploy cluster using cephadm
      desc: Bootstrap and deploy services
      module: test_cephadm.py
      polarion-id: CEPH-83573713
      config:
        steps:
          - config:
              command: bootstrap
              service: cephadm
              args:
                mon-ip: node1
          - config:
              command: add_hosts
              service: host
              args:
                attach_ip_address: true
                labels: apply-all-labels
          - config:
              command: apply
              service: osd
              args:
                all-available-devices: true
          - config:
              command: apply
              service: rgw
              pos_args:
                - rgw.1
              args:
                placement:
                  label: rgw
          - config:
              args:
                - "ceph fs volume create cephfs"
              command: shell
          - config:
              args:
                placement:
                  label: mds
              base_cmd_args:
                verbose: true
              command: apply
              pos_args:
                - cephfs
              service: mds
      destroy-cluster: false
      abort-on-fail: true

  - test:
      name: configure client
      desc: Configure client system
      module: test_client.py
      config:
        command: add
        id: client.1
        node: node4
        install_packages:
          - ceph-common
          - samba-client
          - cifs-utils
        copy_admin_keyring: true
      destroy-cluster: false
      abort-on-fail: true

  - test:
      name: Test retrieve quota and capacity on volume when no quota is added.
      desc: Test retrieve quota and capacity on volume when no quota is added.
      module: smb_per_share_quota_capacity_setup.py
      polarion-id: CEPH-83632299
      config:
        cephfs_volume: cephfs
        smb_subvolume_group: smb
        smb_subvolumes: [ sv1, sv1 ]
        smb_subvolume_mode: '0777'
        smb_cluster_id: smb1
        auth_mode: user
        smb_user_name: user1
        smb_user_password: passwd
        smb_shares: [ share1, share2 ]
        mount_point: /mnt/mount
        cifs_mount_point: /mnt/smb
        sub_dir: /volumes
        path: "/"

  - test:
      name: Test set and retrieve quota and capacity on subvolume
      desc: Test set and retrieve quota and capacity on subvolume
      module: smb_per_share_quota_capacity_operations.py
      polarion-id: CEPH-83632300
      config:
        smb_cluster_id: smb1
        mount_point: /mnt/mount
        cifs_mount_point: /mnt/smb
        sub_dir: /volumes/smb/sv1
        quota: 1000000000
        quota_operation: set_and_get_quota
        path: "/"

  - test:
      name: Test write operation on share within quota limit on subvolume.
      desc: Test write operation on share within quota limit on subvolume.
      module: smb_per_share_quota_capacity_operations.py
      polarion-id: CEPH-83632303
      config:
        smb_cluster_id: smb1
        mount_point: /mnt/mount
        cifs_mount_point: /mnt/smb
        sub_dir: /volumes/smb/sv1
        quota: 1000000000
        quota_operation: write_within_quota
        path: "/"

  - test:
      name: Test write operation on share above quota limit on subvolume.
      desc: Test write operation on share above quota limit on subvolume.
      module: smb_per_share_quota_capacity_operations.py
      polarion-id: CEPH-83632303
      config:
        smb_cluster_id: smb1

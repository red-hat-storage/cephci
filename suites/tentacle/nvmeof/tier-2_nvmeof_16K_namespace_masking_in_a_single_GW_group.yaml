##############################################################################################
# Test suite to scale to 1GW with 32 subsystems and 16k namespace masking
# Cluster Configuration: conf/squid/nvmeof/ceph_nvmeof_ha_cluster_4nodes.yaml
# Inventory: conf/inventory/rhel-10.1-server-x86_64.yaml
################################################################################################

tests:
# Set up the cluster
  - test:
      abort-on-fail: true
      module: install_prereq.py
      name: install ceph pre-requisites

  - test:
      abort-on-fail: true
      config:
        verify_cluster_health: true
        steps:
          - config:
              command: bootstrap
              service: cephadm
              args:
                mon-ip: node1
                registry-url: registry.redhat.io
                allow-fqdn-hostname: true
                log-to-file: true
          - config:
              command: add_hosts
              service: host
              args:
                attach_ip_address: true
                labels: apply-all-labels
          - config:
              command: apply
              service: mgr
              args:
                placement:
                  label: mgr
          - config:
              command: apply
              service: mon
              args:
                placement:
                  label: mon
          - config:
              command: apply
              service: osd
              args:
                all-available-devices: true
      desc: RHCS cluster deployment using cephadm
      destroy-cluster: false
      module: test_cephadm.py
      name: deploy cluster

  - test:
      abort-on-fail: true
      config:
        command: add
        id: client.1
        nodes:
          - node10
          - node11
        install_packages:
          - ceph-common
        copy_admin_keyring: true
      desc: Setup client on NVMEoF gateway
      destroy-cluster: false
      module: test_client.py
      name: configure Ceph client for NVMe tests
      polarion-id: CEPH-83573758

  # 32 subsystems * 32 namespaces = 1024 namespaces per gateway group
  # 1024 namespaces * 16 namespace masking per namespace = 16384 namespaces maskings total
  - test:
      abort-on-fail: false
      config:
        install: true
        node: node6
        rbd_pool: rbd
        nvme_metadata_pool: rbd
        gw_group: group1
        do_not_create_image: true
        gw_nodes:
          - node6
          - node7
          - node8
          - node9
        rep-pool-only: true
        steps:
          - config:
              service: subsystem
              command: add
              args:
                subsystems: 32
                max-namespaces: 1024
          - config:
              service: listener
              command: add
              args:
                subsystems: 32
                port: 4420
                group: group1
                nodes:
                  - node6
                  - node7
                  - node8
                  - node9
          - config:
              service: host
              command: add
              args:
                subsystems: 32
                group: group1
          - config:
              service: namespace
              command: add
              args:
                subsystems: 32
                namespaces_per_subsystem: 32
                group: group1
                image_size: 1G
                pool: rbd
          - config:
              service: namespace
              command: change_visibility
              args:
                subsystems: 32
                group: group1
                auto_visible: false
          - config:
              service: namespace
              command: add_host
              args:
                subsystems: 32
                group: group1
        initiators:
          - node: node10
      desc: Scale to 16k namespace masking with IO on 1 GW and 32 subsystems
      destroy-cluster: false
      module: test_ceph_nvmeof_16k_ns_masking.py
      name: Test Support up to 16K namespace masking in a single GW group
      polarion-id: CEPH-83632267

  - test:
      abort-on-fail: false
      config:
        verify_cluster_health: true
        steps:
          - config:
              command: shell
              args:
                - ceph orch rm nvmeof.nvmeof.group1 --force
          - config:
              command: shell
              args:
                - ceph config set mon mon_allow_pool_delete true
          - config:
              command: shell
              args:
                - ceph osd pool rm .nvmeof .nvmeof --yes-i-really-really-mean-it
          - config:
              command: shell
              args:
                - ceph osd pool rm rbd rbd --yes-i-really-really-mean-it
      desc: Remove nvmeof service and all pools from ceph cluster
      destroy-cluster: false
      do-not-skip-tc: true
      module: test_cephadm.py
      name: Remove nvmeof service on all GW nodes
      polarion-id: CEPH-83595696
